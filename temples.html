<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album showcasing temples from around the world.">
    <meta name="author" content="odono john jachukwu">
    <title>Temple Album</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS: mobile first -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <!-- JavaScript deferred -->
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="site-title">Temple Album</div>
            <button id="hamburger" class="hamburger" aria-label="Menu">☰</button>
        </div>
        <nav id="nav-menu" class="nav-menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Home</h1>
        <div class="gallery">
            <figure>
                <img src="images/los.jpeg" alt="San Diego California Temple">
                <figcaption>San Diego California</figcaption>
            </figure>
            <figure>
                <img src="images/rome.png" alt="Los Angeles California Temple">
                <figcaption>Los Angeles California</figcaption>
            </figure>
            <figure>
                <img src="images/provo.jpeg" alt="Salt Lake City Utah Temple">
                <figcaption>Salt Lake City Utah</figcaption>
            </figure>
            <figure>
                <img src="images/salt.jpeg" alt="Provo Utah Temple">
                <figcaption>Provo Utah</figcaption>
            </figure>
            <figure>
                <img src="images/san-deigo.jpeg" alt="Rome Italy Temple">
                <figcaption>Rome Italy</figcaption>
            </figure>
            <figure>
                <img src="images/temple.jpeg" alt="Tokyo Japan Temple">
                <figcaption>Tokyo Japan</figcaption>
            </figure>
            <figure>
                <img src="images/tokyo.jpeg" alt="London England Temple">
                <figcaption>London England</figcaption>
            </figure>
            <figure>
                <img src="images/utah.png" alt="Paris France Temple">
                <figcaption>Paris France</figcaption>
            </figure>
            <figure>
                <img src="images/city.jpeg" alt=" Lake City Temple">
                <figcaption>Lake City</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>
            ©<span id="currentyear"></span> © <a href="#">Rubia Magdalena Francesco</a> © Madagascar<br>
            Last Modification: <span id="lastModified"></span>
        </p>
    </footer>
</body>
</html>
